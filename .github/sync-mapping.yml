# Infra repo path → wiki doc page mapping
# Used by .github/workflows/doc-sync-check.yml
# Order matters: first matching entry wins (put specific globs before catch-alls)

mappings:
  # --- Media Services ---
  - infra_globs: ["roles/jellyfin/**", "roles/jellyfin_config/**"]
    wiki_pages:
      - configuration/jellyfin-setup.md
      - troubleshooting/jellyfin.md
      - maintenance/jellyfin-maintenance.md
    context: "Jellyfin service or media configuration"

  - infra_globs: ["playbooks/services/jellyfin.yml", "playbooks/services/jellyfin-config.yml"]
    wiki_pages:
      - configuration/jellyfin-setup.md
      - reference/playbooks.md
    context: "Jellyfin service playbooks"

  # --- Reverse Proxy ---
  - infra_globs: ["roles/traefik_proxy/**"]
    wiki_pages:
      - configuration/traefik-setup.md
      - configuration/service-endpoints.md
    context: "Reverse proxy routing or TLS configuration"

  - infra_globs: ["playbooks/services/traefik-proxy.yml"]
    wiki_pages:
      - configuration/traefik-setup.md
      - reference/playbooks.md
    context: "Traefik service playbook"

  # --- Matrix/Synapse ---
  - infra_globs: ["playbooks/services/matrix.yml"]
    wiki_pages:
      - configuration/matrix-setup.md
      - reference/playbooks.md
    context: "Matrix/Synapse service playbook"

  # --- Networking ---
  - infra_globs: ["roles/ufw_firewall/**"]
    wiki_pages:
      - configuration/security.md
      - configuration/networking.md
    context: "Firewall rules or network security"

  - infra_globs: ["roles/tailscale/**"]
    wiki_pages:
      - configuration/networking.md
      - reference/tailscale-auto-approval.md
    context: "Tailscale VPN mesh"

  - infra_globs: ["roles/unbound/**"]
    wiki_pages:
      - configuration/networking.md
      - troubleshooting/dns.md
    context: "DNS resolver configuration"

  - infra_globs: ["roles/unifi_controller/**"]
    wiki_pages:
      - configuration/unifi-controller-setup.md
    context: "UniFi network controller"

  - infra_globs: ["playbooks/networking/**"]
    wiki_pages:
      - configuration/networking.md
      - reference/vlan-migration.md
      - reference/playbooks.md
    context: "Network playbooks"

  # --- NFS / Storage ---
  - infra_globs: ["roles/nfs_client/**", "roles/nfs_server/**"]
    wiki_pages:
      - configuration/networking.md
      - reference/nas-setup.md
      - troubleshooting/nas-nfs.md
    context: "NFS shares configuration"

  - infra_globs: ["roles/btrfs_maintenance/**", "roles/btrfs_snapshots/**", "roles/btrfs_storage/**"]
    wiki_pages:
      - maintenance/backup-recovery.md
      - maintenance/btrfs-maintenance.md
      - reference/btrfs-optimization.md
    context: "Btrfs storage and backup configuration"

  # --- Monitoring ---
  - infra_globs: ["roles/monitoring_stack/**", "roles/node_exporter/**"]
    wiki_pages:
      - configuration/monitoring-stack-setup.md
      - troubleshooting/monitoring.md
      - maintenance/monitoring-maintenance.md
    context: "Monitoring stack (Prometheus/Grafana/exporters)"

  - infra_globs: ["playbooks/monitoring/**"]
    wiki_pages:
      - configuration/monitoring-stack-setup.md
      - reference/playbooks.md
    context: "Monitoring playbooks"

  # --- Security / SSH ---
  - infra_globs: ["roles/ssh_authorized_keys/**"]
    wiki_pages:
      - reference/ssh-bastion.md
      - configuration/security.md
    context: "SSH key management"

  # --- System / Common ---
  - infra_globs: ["roles/common/**", "roles/unattended_upgrades/**"]
    wiki_pages:
      - maintenance/updates.md
    context: "Base system packages and automatic updates"

  - infra_globs: ["playbooks/system/**"]
    wiki_pages:
      - maintenance/updates.md
      - reference/playbooks.md
    context: "System maintenance playbooks"

  # --- Container Management ---
  - infra_globs: ["roles/podman_app/**"]
    wiki_pages:
      - reference/container-versioning.md
      - troubleshooting/podman.md
    context: "Podman container management role"

  # --- Infrastructure / Packer / Terraform ---
  - infra_globs: ["infrastructure/terraform/**"]
    wiki_pages:
      - reference/terraform-modules.md
      - architecture.md
    context: "Terraform infrastructure definitions"

  - infra_globs: ["infrastructure/packer/**"]
    wiki_pages:
      - deployment/golden-image-workflow.md
      - troubleshooting/packer.md
    context: "Packer VM image builds"

  - infra_globs: ["infrastructure/containers/**"]
    wiki_pages:
      - reference/container-versioning.md
    context: "CI container image definitions"

  - infra_globs: ["roles/proxmox_host/**"]
    wiki_pages:
      - reference/proxmox-api-permissions.md
      - architecture.md
    context: "Proxmox hypervisor configuration"

  # --- Other Services ---
  - infra_globs: ["roles/lancache/**"]
    wiki_pages:
      - configuration/lancache-setup.md
      - troubleshooting/lancache.md
      - maintenance/lancache-maintenance.md
    context: "LAN cache service"

  - infra_globs: ["roles/satisfactory/**"]
    wiki_pages:
      - configuration/satisfactory-setup.md
      - troubleshooting/satisfactory.md
      - maintenance/satisfactory-maintenance.md
    context: "Satisfactory game server"

  # --- Playbook Entrypoints ---
  - infra_globs: ["playbooks/main.yml", "playbooks/vars.yml"]
    wiki_pages:
      - reference/playbooks.md
    context: "Main Ansible entrypoint or shared variables"

  - infra_globs: ["playbooks/phases/**"]
    wiki_pages:
      - deployment/phase-based-deployment.md
      - reference/playbooks.md
    context: "Phase-based deployment playbooks"

  - infra_globs: ["playbooks/utility/**"]
    wiki_pages:
      - reference/playbooks.md
    context: "Utility playbooks"

  # --- Ansible Variables ---
  - infra_globs: ["group_vars/**", "host_vars/**"]
    wiki_pages:
      - architecture.md
    context: "Ansible host/group variables"

  # --- Service Definitions ---
  - infra_globs: ["services/**"]
    wiki_pages:
      - configuration/service-endpoints.md
    context: "Service definition files"

  # --- Catch-all for unmapped infrastructure paths ---
  - infra_globs: ["infrastructure/**"]
    wiki_pages:
      - architecture.md
    context: "Infrastructure definition with no specific doc page mapped"

  # --- Catch-all for remaining service playbooks ---
  - infra_globs: ["playbooks/services/**"]
    wiki_pages:
      - configuration/service-endpoints.md
      - reference/playbooks.md
    context: "Service playbook (check if specific doc page exists)"

  # --- Catch-all for unmapped roles ---
  - infra_globs: ["roles/**"]
    wiki_pages: []
    context: "Ansible role with no specific doc page mapped"

  # --- Catch-all for unmapped playbooks ---
  - infra_globs: ["playbooks/**"]
    wiki_pages: []
    context: "Playbook with no specific doc page mapped"
