# Cross-Repo Documentation Sync Check
#
# Triggered by repository_dispatch from the main jellybuntu repo.
# Reads .github/sync-mapping.yml to match changed infra files to wiki
# doc pages, then opens a GitHub Issue with a review checklist.
#
# See: docs/plans/2026-03-03-cross-repo-doc-sync-design.md

name: Check Docs for Infrastructure Changes

on:
  repository_dispatch:
    types: [infra-changed]

jobs:
  check-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout wiki repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install js-yaml minimatch

      - name: Match changes to doc pages
        id: match
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const yaml = require('js-yaml');
            const { minimatch } = require('minimatch');

            const mapping = yaml.load(
              fs.readFileSync('.github/sync-mapping.yml', 'utf8')
            );
            const changedFiles = context.payload.client_payload.changed_files || [];

            const affected = [];
            const unmapped = [];

            for (const file of changedFiles) {
              let matched = false;
              for (const entry of mapping.mappings) {
                if (entry.infra_globs.some(g => minimatch(file, g))) {
                  if (entry.wiki_pages && entry.wiki_pages.length > 0) {
                    affected.push({
                      infra_file: file,
                      wiki_pages: entry.wiki_pages,
                      context: entry.context
                    });
                  } else {
                    unmapped.push({ file, context: entry.context });
                  }
                  matched = true;
                  break;
                }
              }
              if (!matched) {
                unmapped.push({ file, context: 'No mapping defined' });
              }
            }

            core.setOutput('affected_json', JSON.stringify(affected));
            core.setOutput('unmapped_json', JSON.stringify(unmapped));
            core.setOutput('has_matches', String(affected.length > 0 || unmapped.length > 0));

      - name: Open issue
        if: steps.match.outputs.has_matches == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const affected = JSON.parse(process.env.AFFECTED);
            const unmapped = JSON.parse(process.env.UNMAPPED);
            const payload = context.payload.client_payload;
            const shortSha = payload.commit_sha.slice(0, 7);

            // Deduplicate wiki pages and collect reasons
            const pageMap = new Map();
            for (const a of affected) {
              for (const page of a.wiki_pages) {
                if (!pageMap.has(page)) pageMap.set(page, []);
                pageMap.get(page).push(`\`${a.infra_file}\` — ${a.context}`);
              }
            }

            let body = `## Infrastructure Changes Detected\n\n`;
            body += `| | |\n|---|---|\n`;
            body += `| **Commit** | [\`${shortSha}\`](${payload.commit_url}) |\n`;
            body += `| **Author** | ${payload.pusher} |\n`;
            body += `| **Message** | ${payload.commit_message.split('\n')[0]} |\n\n`;

            if (pageMap.size > 0) {
              body += `### Doc Pages to Review\n\n`;
              for (const [page, reasons] of pageMap) {
                const pageUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/docs/${page}`;
                body += `- [ ] [\`${page}\`](${pageUrl})\n`;
                for (const r of reasons) {
                  body += `  - ${r}\n`;
                }
              }
              body += `\n`;
            }

            if (unmapped.length > 0) {
              body += `### Unmapped Changes\n\n`;
              body += `These files changed but have no specific doc page mapped yet:\n\n`;
              for (const u of unmapped) {
                body += `- \`${u.file}\` — ${u.context}\n`;
              }
              body += `\n`;
            }

            body += `---\n`;
            body += `*Auto-generated by [doc-sync-check](${context.payload.repository.html_url}/blob/main/.github/workflows/doc-sync-check.yml)*`;

            // Truncate title to keep it under 70 chars
            const commitTitle = payload.commit_message.split('\n')[0].slice(0, 50);
            const title = `docs sync: ${commitTitle}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['doc-sync']
            });
        env:
          AFFECTED: ${{ steps.match.outputs.affected_json }}
          UNMAPPED: ${{ steps.match.outputs.unmapped_json }}
