site_name: Jellybuntu Infrastructure Wiki
site_description: Homelab infrastructure documentation - Proxmox, k3s, Ansible, and Flux
site_author: Jellybuntu Project
site_url: http://nas.discus-moth.ts.net:8082
repo_name: SilverDFlame/jellybuntu-wiki
repo_url: https://github.com/SilverDFlame/jellybuntu-wiki
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant       # Instant loading
    - navigation.tracking      # Anchor tracking
    - navigation.tabs          # Top-level navigation tabs
    - navigation.sections      # Collapsible sections
    - navigation.expand        # Expand all sections by default
    - navigation.indexes       # Section index pages
    - navigation.top           # Back to top button
    - search.suggest           # Search suggestions
    - search.highlight         # Highlight search terms
    - content.code.copy        # Copy code button
    - content.code.annotate    # Code annotations

plugins:
  - search:
      separator: '[\s\-\_\.]+'  # Better search tokenization
  - mermaid2:  # Mermaid diagram support (requires installation)
      version: 10.6.1
      arguments:
        theme: |
          ^(JSON.parse(__md_get("__palette").index == 1)) ? 'dark' : 'light'

markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
  # PyMdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Infrastructure:
      - Virtual Machines: infrastructure/vms.md
      - Networking: infrastructure/networking.md
      - Storage: infrastructure/storage.md
      - GPU: infrastructure/gpu.md
  - Services:
      - Jellyfin: services/jellyfin.md
      - Tdarr: services/tdarr.md
      - Sonarr: services/sonarr.md
      - Radarr: services/radarr.md
      - Prowlarr: services/prowlarr.md
      - Bazarr: services/bazarr.md
      - Lidarr: services/lidarr.md
      - Jellyseerr: services/jellyseerr.md
      - Navidrome: services/navidrome.md
      - qBittorrent: services/qbittorrent.md
      - SABnzbd: services/sabnzbd.md
      - Unpackerr: services/unpackerr.md
      - Matrix: services/matrix.md
      - PostgreSQL: services/postgresql.md
      - AdGuard Home: services/adguard.md
      - Monitoring: services/monitoring.md
      - Home Assistant: services/home-assistant.md
      - Satisfactory: services/satisfactory.md
      - LanCache: services/lancache.md
      - Nexus Registry: services/nexus.md
      - Woodpecker CI: services/woodpecker.md
  - Operations:
      - Deployment: operations/deployment.md
      - k3s Cluster: operations/k3s-cluster.md
      - Backups: operations/backups.md
      - Secrets: operations/secrets.md
      - Updates: operations/updates.md
  - Troubleshooting: troubleshooting.md
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SilverDFlame/jellybuntu
      name: Main Jellybuntu Repository
    - icon: fontawesome/brands/github
      link: https://github.com/SilverDFlame/jellybuntu-wiki
      name: Documentation Wiki

copyright: Copyright &copy; 2024-2026 Jellybuntu Project

# Link validation (MkDocs 1.6+)
# These settings cause warnings to become errors with --strict flag
validation:
  omitted_files: info  # Changed to warn after spec/plan files move out of docs/
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn
